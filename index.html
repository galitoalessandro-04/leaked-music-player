<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaked Music - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #e0e0e0;
            --shadow-light: #ffffff;
            --shadow-dark: #bebebe;
            --accent: #2196f3;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 400px;
            gap: 30px;
            padding: 20px;
        }

        /* Tarjeta Principal (Acceso al Reproductor) */
        .main-card {
            background: var(--bg);
            border-radius: 30px;
            box-shadow: 20px 20px 60px var(--shadow-dark), -20px -20px 60px var(--shadow-light);
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .main-card:active {
            box-shadow: inset 10px 10px 20px var(--shadow-dark), inset -10px -10px 20px var(--shadow-light);
            transform: scale(0.98);
        }

        .main-card img {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        /* Playlist Neumórfica */
        .playlist-card {
            background: var(--bg);
            border-radius: 30px;
            box-shadow: 20px 20px 60px var(--shadow-dark), -20px -20px 60px var(--shadow-light);
            padding: 25px;
        }

        .playlist-title {
            color: #444;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .song-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .song-item:hover {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
        }

        .song-item.active {
            color: var(--accent);
            font-weight: bold;
        }

        .song-info {
            flex-grow: 1;
            margin-left: 15px;
        }

        .song-name {
            display: block;
            font-size: 14px;
            color: #333;
        }

        .song-artist {
            font-size: 12px;
            color: #777;
        }

        .play-icon {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            border-radius: 50%;
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            color: var(--accent);
        }

        .playing-animation {
            display: none;
            width: 15px;
            height: 15px;
        }

        .active .playing-animation { display: block; }
        .active .fa-play { display: none; }

    </style>
</head>
<body>

<div class="container">
    <div class="main-card" onclick="irAlReproductor()">
        <img src="Amiri - Anuel ft CDobleta.png" alt="Amiri Cover">
        <h2>Reproductor Pro</h2>
        <p style="color: #666;">Haz clic para pantalla completa</p>
    </div>

    <div class="playlist-card">
        <div class="playlist-title">
            <i class="fas fa-list-ul"></i> Mi Playlist
        </div>
        
        <div id="playlist-container">
            </div>
    </div>
</div>

<audio id="main-audio"></audio>

<script>
    const songs = [
        { name: "Amiri", artist: "Anuel ft CDobleta - Yovngchimi", src: "Amiri - Anuel ft CDobleta - Yovngchimi.mp3" },
        { name: "Bugatti", artist: "Anuel AA", src: "Bugatti - Anuel AA.mp3" },
        { name: "Londres", artist: "Anuel AA", src: "Londres - Anuel AA.mp3" },
        { name: "No te olvido", artist: "J Balvin X Anuel AA", src: "No te olvido - J Balvin X Anuel AA.mp3" }
    ];

    const playlistContainer = document.getElementById('playlist-container');
    const audioPlayer = document.getElementById('main-audio');

    // Cargar Playlist
    songs.forEach((song, index) => {
        const div = document.createElement('div');
        div.className = 'song-item';
        div.onclick = () => reproducirEsta(index, div);
        
        div.innerHTML = `
            <div class="play-icon">
                <i class="fas fa-play"></i>
                <div class="playing-animation">
                    <i class="fas fa-volume-up"></i>
                </div>
            </div>
            <div class="song-info">
                <span class="song-name">${song.name}</span>
                <span class="song-artist">${song.artist}</span>
            </div>
        `;
        playlistContainer.appendChild(div);
    });

    function reproducirEsta(index, element) {
        // Quitar estado activo de otros
        document.querySelectorAll('.song-item').forEach(item => item.classList.remove('active'));
        
        // Activar este
        element.classList.add('active');
        
        // Reproducir audio
        audioPlayer.src = songs[index].src;
        audioPlayer.play();
    }

    function irAlReproductor() {
        // Navega al archivo que renombraste
        window.location.href = "reproductor.html";
    }
</script>

</body>
</html>
