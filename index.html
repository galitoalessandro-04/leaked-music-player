<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaked Music</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .navbar {
            width: 100%;
            background-color: #000000;
            color: white;
            padding: 15px 0;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        .container {
            display: flex;
            margin-top: 100px;
            background: #ffffff; 
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            max-width: 900px;
            width: 90%;
            gap: 40px;
            align-items: center;
            color: #1d1d1f;
        }

        .left-side img {
            width: 350px;
            height: 350px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            cursor: pointer;
        }

        .right-side {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .info-tema h2 { 
            margin: 0 0 15px 0; 
            font-size: 24px; 
            font-weight: 600;
        }

        /* Barra de progreso */
        #progreso {
            width: 100%;
            cursor: pointer;
            accent-color: #0071e3;
        }

        /* Controles */
        .controls-row {
            background: #f5f5f7;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
        }

        .material-icons {
            cursor: pointer;
            user-select: none;
        }

        #icon-play-container {
            background: #1d1d1f;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Volumen */
        #volume-popover {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #volumen {
            width: 80px;
            cursor: pointer;
            accent-color: #0071e3;
        }

        /* Playlist */
        .playlist {
            margin-top: 20px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #e5e5e5;
            border-radius: 12px;
        }

        .track {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 14px;
        }

        .track:hover { background: #0071e3; color: white; }
        .active-track { background: #f0f0f5; font-weight: bold; color: #0071e3; border-left: 5px solid #0071e3; }
    </style>
</head>
<body>

    <div class="navbar">LEAKED MUSIC</div>

    <div class="container">
        <div class="left-side">
            <img id="portada-imagen" src="Bugatti.png" alt="Portada" onclick="togglePlay()">
        </div>

        <div class="right-side">
            <div class="info-tema">
                <h2 id="titulo-actual">Bugatti - Anuel AA</h2>
                <audio id="audio-player">
                    <source id="audio-source" src="Bugatti - Anuel AA.mp3" type="audio/mpeg">
                </audio>
            </div>

            <div>
                <input type="range" id="progreso" value="0" min="0" max="100">
                <div style="display: flex; justify-content: space-between; font-size: 12px; color: #86868b; margin-top: 5px;">
                    <span id="tiempo-actual">0:00</span>
                    <span id="tiempo-total">0:00</span>
                </div>
            </div>

            <div class="controls-row">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span class="material-icons" id="btn-random" onclick="activarAleatorio()">shuffle</span>
                    <span class="material-icons" style="font-size: 35px;" onclick="anterior()">skip_previous</span>
                </div>

                <div id="icon-play-container" onclick="togglePlay()">
                    <span class="material-icons" id="icon-play">play_arrow</span>
                </div>

                <div style="display: flex; align-items: center; gap: 15px;">
                    <span class="material-icons" style="font-size: 35px;" onclick="siguiente()">skip_next</span>
                    
                    <div id="volume-popover">
                        <span class="material-icons" style="font-size: 20px;">volume_up</span>
                        <input type="range" id="volumen" min="0" max="1" step="0.1" value="1" oninput="ajustarVolumen(this.value)">
                    </div>
                </div>
            </div>

            <div class="playlist" id="lista-playlist"></div>
        </div>
    </div>

    <script>
        const canciones = [
            { audio: 'Bugatti - Anuel AA.mp3', imagen: 'Bugatti - Anuel AA.png', titulo: 'Bugatti - Anuel AA' },
            { audio: 'Londres - Anuel AA.mp3', imagen: 'Londres - Anuel AA.png', titulo: 'Londres - Anuel AA' },
            { audio: 'Amiri - Anuel ft CDobleta - Yovngchimi.mp3', imagen: 'Amiri - Anuel ft CDobleta - Yovngchimi.png', titulo: 'Amiri - Anuel ft CDobleta - Yovngchimi' },
            { audio: 'No te olvido - J Balvin X Anuel AA.mp3', imagen: 'No te olvido - J Balvin X Anuel AA.png', titulo: 'No te olvido - Balvin x Anuel AA' }
        ];

        let indiceActual = 0;
        let esAleatorio = false;
        const audio = document.getElementById('audio-player');
        const barraProgreso = document.getElementById('progreso');
        const iconPlay = document.getElementById('icon-play');

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                iconPlay.innerText = "pause";
            } else {
                audio.pause();
                iconPlay.innerText = "play_arrow";
            }
        }

        audio.ontimeupdate = function() {
            if (audio.duration) {
                const porcentaje = (audio.currentTime / audio.duration) * 100;
                barraProgreso.value = porcentaje;
                document.getElementById('tiempo-actual').innerText = formatearTiempo(audio.currentTime);
                document.getElementById('tiempo-total').innerText = formatearTiempo(audio.duration);
            }
        };

        barraProgreso.oninput = function() {
            audio.currentTime = (barraProgreso.value * audio.duration) / 100;
        };

        function formatearTiempo(seg) {
            let m = Math.floor(seg / 60);
            let s = Math.floor(seg % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function ajustarVolumen(v) { audio.volume = v; }

        function cambiarCancion(idx) {
            indiceActual = idx;
            audio.src = canciones[idx].audio;
            document.getElementById('portada-imagen').src = canciones[idx].imagen;
            document.getElementById('titulo-actual').innerText = canciones[idx].titulo;
            audio.play();
            iconPlay.innerText = "pause";
            cargarPlaylist();
        }

        function siguiente() {
            let next = esAleatorio ? Math.floor(Math.random() * canciones.length) : (indiceActual + 1) % canciones.length;
            cambiarCancion(next);
        }

        function anterior() {
            indiceActual = (indiceActual - 1 + canciones.length) % canciones.length;
            cambiarCancion(indiceActual);
        }

        function activarAleatorio() {
            esAleatorio = !esAleatorio;
            document.getElementById('btn-random').style.color = esAleatorio ? "#0071e3" : "#86868b";
        }

        function cargarPlaylist() {
            const lista = document.getElementById('lista-playlist');
            lista.innerHTML = '';
            canciones.forEach((c, i) => {
                const div = document.createElement('div');
                div.className = `track ${i === indiceActual ? 'active-track' : ''}`;
                div.innerText = c.titulo;
                div.onclick = () => cambiarCancion(i);
                lista.appendChild(div);
            });
        }

        audio.onended = siguiente;
        window.onload = cargarPlaylist;
    </script>
</body>
</html>
