<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaked Music - Home</title>
    <style>
        :root {
            --bg: #e0e0e0;
            --shadow-light: #ffffff;
            --shadow-dark: #bebebe;
            --accent: #ff0000;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Barra Superior */
        nav {
            width: 100%;
            height: 60px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            color: white;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 25px;
            padding: 30px;
            max-width: 1000px;
        }

        /* Estilo Neumórfico de los Cuadros */
        .card {
            background: var(--bg);
            border-radius: 20px;
            box-shadow: 10px 10px 20px var(--shadow-dark), 
                        -10px -10px 20px var(--shadow-light);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:active {
            box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                        inset -5px -5px 10px var(--shadow-light);
        }

        /* Playlist Funcional */
        .playlist-container {
            width: 100%;
        }

        .song-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow-dark), 
                        -4px -4px 8px var(--shadow-light);
            cursor: pointer;
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-icon {
            color: var(--accent);
            font-weight: bold;
        }

        .playing {
            color: #00ff00;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        img { width: 100px; border-radius: 10px; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold; font-size: 20px;">LEAKED MUSIC</div>
    <input type="text" placeholder="Buscar..." style="border-radius: 20px; border: none; padding: 5px 15px;">
</nav>

<div class="container">
    <div class="card" onclick="location.href='reproductor.html'">
        <h3>Reproductor Principal</h3>
        <img src="Bugatti - Anuel AA.png" alt="Bugatti">
        <p>Anuel AA - Bugatti</p>
    </div>

    <div class="card">
        <h3>Próximos Temas</h3>
        <div class="playlist-container">
            <div class="song-item" onclick="playSong('Amiri - Anuel ft CDobleta.mp3', this)">
                <div class="song-info">
                    <span class="play-icon">▶</span>
                    <span>Amiri - Anuel AA ft CDobleta</span>
                </div>
            </div>
            <div class="song-item" onclick="playSong('Londres - Anuel AA.mp3', this)">
                <div class="song-info">
                    <span class="play-icon">▶</span>
                    <span>Londres - Anuel AA</span>
                </div>
            </div>
            <div class="song-item" onclick="playSong('No te olvido - J Balvin.mp3', this)">
                <div class="song-info">
                    <span class="play-icon">▶</span>
                    <span>No te olvido - J Balvin</span>
                </div>
            </div>
        </div>
    </div>
</div>

<audio id="main-audio"></audio>

<script>
    let currentAudio = document.getElementById('main-audio');
    let currentPlayingItem = null;

    function playSong(file, element) {
        // Si ya está sonando, lo pausamos
        if (currentAudio.src.includes(file) && !currentAudio.paused) {
            currentAudio.pause();
            element.querySelector('.play-icon').innerHTML = "▶";
            element.classList.remove('playing');
        } else {
            // Si es una nueva canción o está pausada
            if (!currentAudio.src.includes(file)) {
                currentAudio.src = file;
            }
            
            // Limpiar iconos anteriores
            if (currentPlayingItem) {
                currentPlayingItem.querySelector('.play-icon').innerHTML = "▶";
                currentPlayingItem.classList.remove('playing');
            }

            currentAudio.play();
            element.querySelector('.play-icon').innerHTML = "⏸";
            element.classList.add('playing');
            currentPlayingItem = element;
        }
    }
</script>

</body>
</html>
