<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaked Music - Home</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #e0e5ec;
            --neu-white: #ffffff;
            --neu-shadow: #a3b1c6;
            --accent-blue: #0071e3;
            --text-dark: #44474a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* BARRA NEGRA SUPERIOR (NAVBAR) - FUENTE PROTEGIDA */
        .navbar {
            width: 100%;
            background-color: #000000;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-container input {
            background: #222;
            border: none;
            padding: 8px 35px 8px 15px;
            border-radius: 20px;
            color: white;
            outline: none;
            width: 200px;
        }

        .search-container .fa-search {
            position: absolute;
            right: 12px;
            color: #888;
        }

        /* CONTENEDOR PRINCIPAL SIMÉTRICO */
        .main-content {
            display: flex;
            margin-top: 80px;
            margin-bottom: 50px;
            max-width: 1200px;
            width: 90%;
            gap: 20px;
            box-sizing: border-box;
        }

        /* COLUMNA IZQUIERDA Y CENTRAL */
        .grid-container {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .blocks-top {
            display: flex;
            gap: 20px;
        }

        /* SECCIONES NEUMÓRFICAS CON MOVIMIENTO AL PASAR EL CURSOR */
        .neu-block {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 10px 10px 20px var(--neu-shadow), 
                        -10px -10px 20px var(--neu-white);
            box-sizing: border-box;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        /* EL MOVIMIENTO QUE TE GUSTÓ */
        .neu-block:hover {
            transform: translateY(-8px);
            box-shadow: 15px 15px 30px var(--neu-shadow), 
                        -15px -15px 30px var(--neu-white);
        }

        /* FAVORITOS */
        .favoritos-block {
            flex: 2;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .favoritos-mosaic {
            width: 100px;
            height: 100px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 5px 5px 10px var(--neu-shadow), 
                        -5px -5px 10px var(--neu-white);
        }
        .favoritos-text h2 { margin: 0; font-size: 24px; font-weight: 700; color: var(--text-dark); }
        .favoritos-text p { margin: 2px 0 10px 0; color: #777; font-size: 14px; }

        /* NUEVOS LEAKS */
        .leaks-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .leak-card { text-align: center; }
        .leak-foto {
            width: 100%;
            height: 100px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 8px;
            box-shadow: 5px 5px 10px var(--neu-shadow), -5px -5px 10px var(--neu-white);
        }

        /* COLUMNA DERECHA */
        .sidebar-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .player-active {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .player-foto {
            width: 100%;
            height: 120px;
            border-radius: 15px;
            object-fit: cover;
            margin-bottom: 10px;
            box-shadow: 5px 5px 10px var(--neu-shadow), -5px -5px 10px var(--neu-white);
        }

        /* PLAYLIST FUNCIONAL CON COLORES DEL REPRODUCTOR */
        .playlist-block ul { list-style: none; padding: 0; margin: 0; }
        
        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 10px;
            border-radius: 15px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: 0.2s;
            background: var(--bg-color);
        }

        .track-item:hover {
            box-shadow: inset 4px 4px 8px var(--neu-shadow), inset -4px -4px 8px var(--neu-white);
        }

        .track-left { display: flex; align-items: center; gap: 12px; }

        /* Estilo del círculo de play/pausa con los colores del reproductor */
        .play-icon-circle {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 3px 3px 6px var(--neu-shadow), -3px -3px 6px var(--neu-white);
            color: var(--accent-blue); /* Color azul del reproductor */
            transition: 0.2s;
        }

        /* Efecto cuando está sonando (hundido y vibrante) */
        .playing .play-icon-circle {
            box-shadow: inset 2px 2px 5px var(--neu-shadow), inset -2px -2px 5px var(--neu-white);
            color: #00ff00; /* Verde para indicar que está activo */
        }

        .track-text h5 { margin: 0; font-size: 14px; color: var(--text-dark); }
        .track-text p { margin: 0; color: #777; font-size: 11px; }

        /* Botón de Play Principal */
        .player-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2b2d31;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
        }

        audio { display: none; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="nav-logo">LEAKED MUSIC</div>
        <div class="search-container">
            <input type="text" placeholder="Buscar música...">
            <i class="fas fa-search"></i>
        </div>
    </div>

    <div class="main-content">
        <div class="grid-container">
            <div class="blocks-top">
                <div class="neu-block favoritos-block">
                    <img src="Bugatti - Anuel AA.png" alt="Mosaico" class="favoritos-mosaic">
                    <div class="favoritos-text">
                        <h2>tus favoritos en repeat</h2>
                        <p>Playlist Personalizada</p>
                    </div>
                </div>

                <div class="neu-block artista-block" style="flex:1; text-align:center;">
                    <img src="No te olvido - J Balvin X Anuel AA.png" alt="J Balvin" style="width:70px; height:70px; border-radius:50%; object-fit:cover; margin-bottom:10px; box-shadow: 5px 5px 10px var(--neu-shadow);">
                    <p style="margin:0; font-size:11px; color:#777;">Artista Destacado</p>
                    <h3 style="margin:2px 0; font-size:15px;">J Balvin</h3>
                </div>
            </div>

            <div class="neu-block leaks-block">
                <h3 style="margin-top:0;">Nuevos Leaks</h3>
                <div class="leaks-grid">
                    <div class="leak-card"><img src="Bugatti - Anuel AA.png" class="leak-foto"><h4>Bugatti</h4></div>
                    <div class="leak-card"><img src="Londres - Anuel AA.png" class="leak-foto"><h4>Londres</h4></div>
                    <div class="leak-card"><img src="Amiri - Anuel ft CDobleta - Yovngchimi.png" class="leak-foto"><h4>Amiri</h4></div>
                    <div class="leak-card"><img src="No te olvido - J Balvin X Anuel AA.png" class="leak-foto"><h4>No te olvido</h4></div>
                </div>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="neu-block player-active" onclick="abrirReproductor()">
                <img id="main-player-img" src="Bugatti - Anuel AA.png" class="player-foto">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h4 id="main-player-title" style="margin:0;">Bugatti</h4>
                        <p id="main-player-artist" style="margin:0; font-size:12px; color:#777;">Anuel AA</p>
                    </div>
                    <button class="player-btn" onclick="toggleMainAudio(event)">
                        <i class="material-icons" id="main-play-icon">play_arrow</i>
                    </button>
                </div>
            </div>

            <div class="neu-block playlist-block">
                <ul id="playlist-list">
                    <li class="track-item" onclick="playThis('Bugatti - Anuel AA.mp3', 'Bugatti', 'Anuel AA', 'Bugatti - Anuel AA.png', this)">
                        <div class="track-left">
                            <div class="play-icon-circle"><i class="material-icons" style="font-size:18px;">play_arrow</i></div>
                            <div class="track-text"><h5>Bugatti</h5><p>Anuel AA</p></div>
                        </div>
                    </li>
                    <li class="track-item" onclick="playThis('Londres - Anuel AA.mp3', 'Londres', 'Anuel AA', 'Londres - Anuel AA.png', this)">
                        <div class="track-left">
                            <div class="play-icon-circle"><i class="material-icons" style="font-size:18px;">play_arrow</i></div>
                            <div class="track-text"><h5>Londres</h5><p>Anuel AA</p></div>
                        </div>
                    </li>
                    <li class="track-item" onclick="playThis('Amiri - Anuel ft CDobleta.mp3', 'Amiri', 'Anuel AA', 'Amiri - Anuel ft CDobleta - Yovngchimi.png', this)">
                        <div class="track-left">
                            <div class="play-icon-circle"><i class="material-icons" style="font-size:18px;">play_arrow</i></div>
                            <div class="track-text"><h5>Amiri</h5><p>Anuel AA</p></div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <audio id="global-audio"></audio>

    <script>
        const audio = document.getElementById('global-audio');
        const mainPlayIcon = document.getElementById('main-play-icon');
        let currentTrackItem = null;

        function playThis(file, title, artist, img, element) {
            if (audio.src.includes(file)) {
                if (audio.paused) {
                    audio.play();
                    updateIcons(true, element);
                } else {
                    audio.pause();
                    updateIcons(false, element);
                }
            } else {
                audio.src = file;
                audio.play();
                document.getElementById('main-player-title').innerText = title;
                document.getElementById('main-player-artist').innerText = artist;
                document.getElementById('main-player-img').src = img;
                updateIcons(true, element);
            }
        }

        function updateIcons(isPlaying, element) {
            document.querySelectorAll('.track-item').forEach(item => {
                item.classList.remove('playing');
                item.querySelector('.material-icons').innerText = "play_arrow";
            });

            if (isPlaying) {
                element.classList.add('playing');
                element.querySelector('.material-icons').innerText = "pause";
                mainPlayIcon.innerText = "pause";
            } else {
                element.querySelector('.material-icons').innerText = "play_arrow";
                mainPlayIcon.innerText = "play_arrow";
            }
            currentTrackItem = element;
        }

        function toggleMainAudio(event) {
            event.stopPropagation();
            if (audio.src === "" || audio.paused) {
                if (audio.src === "") {
                    playThis('Bugatti - Anuel AA.mp3', 'Bugatti', 'Anuel AA', 'Bugatti - Anuel AA.png', document.querySelector('.track-item'));
                } else {
                    audio.play();
                    mainPlayIcon.innerText = "pause";
                    if (currentTrackItem) currentTrackItem.querySelector('.material-icons').innerText = "pause";
                }
            } else {
                audio.pause();
                mainPlayIcon.innerText = "play_arrow";
                if (currentTrackItem) currentTrackItem.querySelector('.material-icons').innerText = "play_arrow";
            }
        }

        function abrirReproductor() {
            window.location.href = "reproductor.html";
        }

        audio.onended = () => {
            mainPlayIcon.innerText = "play_arrow";
            if (currentTrackItem) {
                currentTrackItem.classList.remove('playing');
                currentTrackItem.querySelector('.material-icons').innerText = "play_arrow";
            }
        };
    </script>
</body>
</html>
